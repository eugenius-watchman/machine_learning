name: ML CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"
          pip install nbconvert

      - name: Run notebooks
        run: |
          for notebook in notebooks/*.ipynb; do
            echo "Running $notebook"
            jupyter nbconvert --to script --output-dir=/tmp "$notebook"
            python /tmp/$(basename "$notebook" .ipynb).py || echo "Notebook $notebook failed"
          done
